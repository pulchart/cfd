# CFD Kickstart ROM builder config (consumed by tools/kickstart/kickstart.py).
# Run `tools/kickstart/kickstart.py --help` for the full schema.

models:

  A600-3.2.3:
    os:            "3.2.3"
    cpu:           "68000"
    sourcerom_crc: "0xe1f50b0b"     # CDTVA500A600A2000.47.115.rom
    adf_crc:       "0xb6dfa531"     # ModulesA600_3.2.3.adf
    saveprofile:   ""               # A600 has one 16-bit Kickstart; just flash cfd.rom
    template:      "capitoline.script.3.2.3.j2"
    amigaos_dir:   "/opt/AmigaOS/Update3.2.3"

  A1200-3.2.3:
    os:            "3.2.3"
    cpu:           "68020"
    sourcerom_crc: "0xb18d3b67"     # A1200.47.115.rom
    adf_crc:       "0x920f6115"     # ModulesA1200_3.2.3.adf
    # A1200 has two physical Kickstart chips; emit byteswapped halves
    # cfd.hi.bin / cfd.lo.bin for dual-chip EPROM flashing.
    saveprofile: |-
      romprofile dual 0 1
      saveprofile 512 byteswap ./cfd
    template:      "capitoline.script.3.2.3.j2"
    amigaos_dir:   "/opt/AmigaOS/Update3.2.3"

  A600-3.1:
    os:            "3.1"
    cpu:           "68000"
    sourcerom_crc: "0xfc24ae0d"     # kick40063.A600
    adf_crc:       ""               # 3.1 has no Modules ADF
    saveprofile:   ""
    template:      "capitoline.script.3.1.j2"
    amigaos_dir:   "/opt/AmigaOS/AmigaOS3.1"

  A1200-3.1:
    os:            "3.1"
    cpu:           "68020"
    sourcerom_crc: "0x1483a091"     # kick40068.A1200
    adf_crc:       ""               # 3.1 has no Modules ADF
    saveprofile: |-
      romprofile dual 0 1
      saveprofile 512 byteswap ./cfd
    template:      "capitoline.script.3.1.j2"
    amigaos_dir:   "/opt/AmigaOS/AmigaOS3.1"

  # Kickstart v37 revision matrix:
  # <= 37.299  "ROM 2.04" no HD, no PCMCIA
  #    37.300  "ROM 2.05" IDE up to 40 MB, PCMCIA flaky
  #    37.350  "ROM 2.05" IDE up to 2 GB, PCMCIA OK
  A600-2.05:
    os:            "2.05"
    cpu:           "68000"
    sourcerom_crc: "0x43b0df7b"     # rev 37.350 (A600HD)
    adf_crc:       ""               # 2.0x has no Modules ADF
    saveprofile:   ""
    template:      "capitoline.script.2.0x.j2"
    amigaos_dir:   "/opt/AmigaOS/AmigaOS2.05"

  A500plus-2.04:
    os:            "2.04"
    cpu:           "68000"
    sourcerom_crc: "0xc3bdb240"     # rev 37.175 (A500+)
    adf_crc:       ""               # 2.0x has no Modules ADF
    saveprofile:   ""
    template:      "capitoline.script.2.0x.j2"
    amigaos_dir:   "/opt/AmigaOS/AmigaOS2.04"


modules:
  # NOTE: `adf_path:` is case-sensitive (capcli's `add ADF:/` does an
  # exact-case lookup against ADF entries): match the on-disk casing
  # (`Resources/`, not `RESOURCES/`).  A typo trips the build's
  # `error:` log guard rather than silently dropping the module.

  # 3.1 stock-module substitutions. Each `replace` row swaps a stock F8
  # module for either a file (`with:`) or an entry inside an ADF
  # (`adf:` + `adf_path:`).
  #
  # Hyperion v47.4 `card.resource` pulled directly from the 3.2.3
  # Modules ADFs.  `rom: "F8"` -> substitute at the stock F8 slot.
  #
  #- {replace: "card.resource", adf: "/opt/AmigaOS/Update3.2.3/ADFs/ModulesA600_3.2.3.adf",  adf_path: "LIBS/Resources/card.resource", os: "3.1", cpu: "68000", rom: "F8"}
  #- {replace: "card.resource", adf: "/opt/AmigaOS/Update3.2.3/ADFs/ModulesA1200_3.2.3.adf", adf_path: "LIBS/Resources/card.resource", os: "3.1", cpu: "68020", rom: "F8"}

  # Hyperion v47.4 `scsi.device` binary doesn't fit in 3.1's
  # tight F8 budget, move it to E0 instead.
  #- {replace: "scsi.device",   adf: "/opt/AmigaOS/Update3.2.3/ADFs/ModulesA600_3.2.3.adf",  adf_path: "DEVS/A600/scsi.device",  os: "3.1", cpu: "68000", rom: "E0"}
  #- {replace: "scsi.device",   adf: "/opt/AmigaOS/Update3.2.3/ADFs/ModulesA1200_3.2.3.adf", adf_path: "DEVS/A1200/scsi.device", os: "3.1", cpu: "68020", rom: "E0"}

  # Furia 8 MB PCMCIA `card.resource` a community alternative;
  # mutually exclusive with the Hyperion cardres rows above.
  #- {replace: "card.resource", with: "Capitoline Hashes/PCMCIA/cardres.ld.strip", os: "3.1", rom: "F8"}

  # Other verbs (commented examples).
  # carddisk.device is the stock PCMCIA SRAM-card handler;
  # if you're using compactflash.device above instead, you can omit
  # carddisk.device from F8 to save space (skip) or just push it out of
  # F8 to E0 to keep it available (relocate).
  #- {skip:     "carddisk.device", os: "3.1"}              # omit carddisk.device entirely
  #- {relocate: "carddisk.device", os: "3.1", rom: "E0"}   # keep carddisk.device but move to E0

  # workbench.library + icon.library from the model's modules ADF (3.2.3 only;
  # 3.1 has them in F8 source ROM). ADF-sourced rows must use rom: "E0".
  - {adf_modules: "LIBS/workbench.library", os: "3.2.3", rom: "E0"}
  - {adf_modules: "LIBS/icon.library", os: "3.2.3", rom: "E0"}

  # rexxsyslib from a specific Workbench ADF, per OS.
  - {adf: "/opt/AmigaOS/AmigaOS3.2/adf/workbench3.2.adf", adf_path: "Libs/rexxsyslib.library", os: "3.2.3", rom: "E0"}
  - {adf: "/opt/AmigaOS/AmigaOS3.1/ADFs/wbench31.adf", adf_path: "Libs/rexxsyslib.library", os: "3.1", rom: "E0"}

  # Filesystems (all builds):
  - {file: "/opt/AmigaOS/pfs/v20,0/pfs3aio", rom: "E0"}
  - {file: "/opt/AmigaOS/fat95/3.22/68000/fat95", cpu: "68000", rom: "E0"}
  - {file: "/opt/AmigaOS/fat95/3.22/68020/fat95", cpu: "68020", rom: "E0"}

  # Compiled artifacts.
  # - 3.2.3 has room in F8 for ptable.library
  # - 3.1 / 2.05's F8 is space-full so ptable goes to E0.
  # - 2.04 omits both modules entirely as A500plus has no PCMCIA slot and no internal IDE.
  - {file: "dist/full/68000/libs/ptable.library",      cpu: "68000", os: "3.2.3", rom: "F8"}
  - {file: "dist/full/68020/libs/ptable.library",      cpu: "68020", os: "3.2.3", rom: "F8"}
  - {file: "dist/full/68000/libs/ptable.library",      cpu: "68000", os: "3.1",   rom: "E0"}
  - {file: "dist/full/68020/libs/ptable.library",      cpu: "68020", os: "3.1",   rom: "E0"}
  - {file: "dist/full/68000/libs/ptable.library",      cpu: "68000", os: "2.05",  rom: "E0"}

  - {file: "dist/full/68020/devs/compactflash.device", cpu: "68020", os: "3.2.3", rom: "E0"}
  - {file: "dist/full/68000/devs/compactflash.device", cpu: "68000", os: "3.2.3", rom: "E0"}
  - {file: "dist/full/68000/devs/compactflash.device", cpu: "68000", os: "3.1",   rom: "E0"}
  - {file: "dist/full/68000/devs/compactflash.device", cpu: "68020", os: "3.1",   rom: "E0"}
  - {file: "dist/full/68000/devs/compactflash.device", cpu: "68000", os: "2.05",  rom: "E0"}
